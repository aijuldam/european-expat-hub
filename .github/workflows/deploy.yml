name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm run build
        env:
          BASE_PATH: /european-expat-hub/
          NODE_ENV: production

      - name: Verify prerendered HTML (CI check)
        run: |
          grep -q '<h1' dist/public/index.html \
            || { echo "❌ / is missing <h1"; exit 1; }
          grep -q '<h1' dist/public/countries/netherlands/index.html \
            || { echo "❌ /countries/netherlands is missing <h1"; exit 1; }
          grep -q '<h1' dist/public/salary-calculator/index.html \
            || { echo "❌ /salary-calculator is missing <h1"; exit 1; }
          echo "✓ All spot-check routes contain <h1>"

      - name: Copy index.html to 404.html (SPA fallback)
        run: cp dist/public/index.html dist/public/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
