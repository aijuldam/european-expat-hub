<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #fafaf7; }
  body { padding: 26px 28px; font-family: var(--font-sans); }
  .head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 18px; }
  .title { font-family: var(--font-display); font-size: 15px; font-weight: 600; letter-spacing: -0.01em; color: var(--fg-1); }
  .sub { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-3); }
  .ramp { display: grid; grid-template-columns: repeat(9, 1fr); border-radius: 4px; overflow: hidden; border: 1px solid rgba(11,15,13,.08); }
  .sw { aspect-ratio: 1 / 1.1; padding: 10px; display: flex; flex-direction: column; justify-content: space-between; position: relative; }
  .sw .step { font-family: var(--font-mono); font-size: 10px; opacity: 0.65; }
  .sw .hex { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.02em; opacity: 0.8; }
</style>
</head>
<body>
  <div class="head">
    <div class="title">Ink · matte near-black ramp</div>
    <div class="sub">9 stops · 900 → 50</div>
  </div>
  <div class="ramp">
    <div class="sw" style="background:#0b0f0d;color:#fff"><span class="step">900</span><span class="hex">0B0F0D</span></div>
    <div class="sw" style="background:#141916;color:#fff"><span class="step">800</span><span class="hex">141916</span></div>
    <div class="sw" style="background:#1e241f;color:#fff"><span class="step">700</span><span class="hex">1E241F</span></div>
    <div class="sw" style="background:#303834;color:#fff"><span class="step">600</span><span class="hex">303834</span></div>
    <div class="sw" style="background:#505853;color:#fff"><span class="step">500</span><span class="hex">505853</span></div>
    <div class="sw" style="background:#737b76;color:#fff"><span class="step">400</span><span class="hex">737B76</span></div>
    <div class="sw" style="background:#9ea4a0;color:#0b0f0d"><span class="step">300</span><span class="hex">9EA4A0</span></div>
    <div class="sw" style="background:#c6cbc7;color:#0b0f0d"><span class="step">200</span><span class="hex">C6CBC7</span></div>
    <div class="sw" style="background:#e5e8e6;color:#0b0f0d"><span class="step">100</span><span class="hex">E5E8E6</span></div>
  </div>
</body>
</html>
