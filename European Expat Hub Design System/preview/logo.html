<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #fafaf7; }
  body { padding: 24px 28px; font-family: var(--font-sans); }
  .head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 18px; }
  .title { font-family: var(--font-display); font-size: 15px; font-weight: 600; letter-spacing: -0.01em; color: #0b0f0d; }
  .sub { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: #737b76; }

  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: rgba(11,15,13,.1); border: 1px solid rgba(11,15,13,.1); border-radius: 4px; overflow: hidden; }
  .cell { padding: 26px 24px; display: flex; align-items: center; gap: 24px; }
  .cell.paper { background: #fafaf7; }
  .cell.ink { background: #0b0f0d; color: #fafaf7; }
  .lbl { font-family: var(--font-mono); font-size: 9.5px; letter-spacing: 0.16em; text-transform: uppercase; opacity: 0.55; min-width: 70px; }
</style>
</head>
<body>
  <div class="head">
    <div class="title">Logo — mark &amp; wordmark</div>
    <div class="sub">Two surfaces · matte treatments</div>
  </div>
  <div class="grid">
    <div class="cell paper"><span class="lbl">Mark</span><img src="../assets/logo-mark.svg" width="44" height="44"></div>
    <div class="cell paper"><span class="lbl">Lockup</span><img src="../assets/logo-horizontal.svg" width="230" height="52"></div>
    <div class="cell ink"><span class="lbl">On ink</span><img src="../assets/logo-mark.svg" width="44" height="44" style="filter: invert(1)"></div>
    <div class="cell ink"><span class="lbl">Reversed</span><img src="../assets/logo-horizontal-light.svg" width="230" height="52"></div>
  </div>
</body>
</html>
