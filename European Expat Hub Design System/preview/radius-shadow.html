<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-3); }
  body { padding: 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .group-label { grid-column: 1/-1; font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-3); margin: 0; }
  .card { background: var(--bg-2); border: 1px solid var(--border-1); padding: 14px 16px; }
  .r-xs { border-radius: 4px; }
  .r-sm { border-radius: 6px; }
  .r-md { border-radius: 8px; }
  .r-lg { border-radius: 12px; }
  .r-xl { border-radius: 16px; }
  .r-2xl { border-radius: 20px; }
  .lbl { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); }
  .name { font-size: 13px; font-weight: 600; color: var(--fg-1); }
  .s-xs { box-shadow: var(--shadow-xs); }
  .s-sm { box-shadow: var(--shadow-sm); }
  .s-md { box-shadow: var(--shadow-md); }
  .s-lg { box-shadow: var(--shadow-lg); }
</style>
</head>
<body>
  <div class="group-label">Radius</div>
  <div class="card r-sm"><div class="name">Small · 6px</div><div class="lbl">--radius-sm · buttons, inputs</div></div>
  <div class="card r-md"><div class="name">Medium · 8px</div><div class="lbl">--radius-md · pills, chips</div></div>
  <div class="card r-lg"><div class="name">Large · 12px</div><div class="lbl">--radius-lg · cards</div></div>
  <div class="card r-xl"><div class="name">XL · 16px</div><div class="lbl">--radius-xl · hero panels</div></div>

  <div class="group-label">Shadow</div>
  <div class="card r-lg s-xs"><div class="name">shadow-xs</div><div class="lbl">barely there</div></div>
  <div class="card r-lg s-sm"><div class="name">shadow-sm</div><div class="lbl">default card at rest</div></div>
  <div class="card r-lg s-md"><div class="name">shadow-md</div><div class="lbl">card on hover</div></div>
  <div class="card r-lg s-lg"><div class="name">shadow-lg</div><div class="lbl">popover / dropdown</div></div>
</body>
</html>
