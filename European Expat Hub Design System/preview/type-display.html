<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-2); }
  body { padding: 24px 28px; }
  .specimen { font-family: var(--font-display); font-weight: 600; color: var(--fg-1); letter-spacing: -0.02em; line-height: 1.05; margin: 0 0 6px; }
  .label { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); display: block; margin-bottom: 16px; }
</style>
</head>
<body>
  <div class="specimen" style="font-size:56px">Where will you live?</div>
  <span class="label">Fraunces 600 · 56/60 · -0.02em · h1</span>
  <div class="specimen" style="font-size:36px">Find the best European city</div>
  <span class="label">Fraunces 600 · 36/42 · h2</span>
  <div class="specimen" style="font-size:22px">How it works</div>
  <span class="label">Fraunces 600 · 22/28 · h3</span>
</body>
</html>
